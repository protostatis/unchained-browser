# Builds release binaries for all supported platforms and attaches them
# to a GitHub Release. Triggered by pushing a tag matching `v*`, e.g.:
#
#   git tag v0.0.1 && git push origin v0.0.1
#
# Or via the workflow_dispatch button in the Actions UI.

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.0.1) — must already exist as a git tag"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14         # Apple Silicon runner, native build
            wheel_platform: macosx_11_0_arm64
          - target: x86_64-apple-darwin
            os: macos-14         # cross-compile from arm64 — macos-13 pool
                                 # is deprecated and queues forever; arm64
                                 # → x86_64 cross works first try (Apple's
                                 # clang handles it; BoringSSL fine).
                                 # Smoke test runs the x86_64 binary via
                                 # Rosetta on the arm64 runner.
            wheel_platform: macosx_10_12_x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm  # GitHub native ARM64 runner — covers Graviton2/3/4
            wheel_platform: manylinux_2_35_aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # rquest pulls in boring-sys2 (BoringSSL) which needs cmake + ninja.
      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja
          # Apple's bundled clang already supports cross-compilation between
          # arm64 and x64; cargo --target handles the rest.

      - name: Install build deps (Linux)
        if: runner.os == 'Linux' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Install build deps (manylinux)
        if: runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          yum install -y cmake ninja-build

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          # Verify the binary at least starts and accepts a `close` command.
          # Native runs only — skip when host arch != target arch.
          if [ "${{ matrix.target }}" = "x86_64-apple-darwin" ] && [ "$(uname -m)" = "arm64" ]; then
            echo "skip: cross-compiled binary, host can't run it"
            exit 0
          fi
          if [ "${{ matrix.target }}" = "aarch64-apple-darwin" ] && [ "$(uname -m)" = "x86_64" ]; then
            echo "skip: cross-compiled binary, host can't run it"
            exit 0
          fi
          echo '{"id":1,"method":"close"}' | ./target/${{ matrix.target }}/release/unbrowser > /tmp/out
          cat /tmp/out
          grep -q '"result":"bye"' /tmp/out

      - name: Package archive
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../unbrowser-${{ matrix.target }}.tar.gz unbrowser

      - name: Compute checksum
        run: |
          shasum -a 256 unbrowser-${{ matrix.target }}.tar.gz > unbrowser-${{ matrix.target }}.tar.gz.sha256
          cat unbrowser-${{ matrix.target }}.tar.gz.sha256

      # ---- Python wheel ----
      # Bundle the freshly-built native binary into a Python wheel for this
      # platform. End users then `pip install pyunbrowser` and get a working
      # binary with nothing else to install. The same wheel is published
      # to PyPI by the publish-pypi job. (PyPI distribution is `pyunbrowser`
      # because PyPI's name moderation blocks `unbrowser`; the import name
      # remains `unbrowser` everywhere.)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bundle binary into Python package
        run: |
          cp target/${{ matrix.target }}/release/unbrowser python/unbrowser/_bin/unbrowser
          chmod +x python/unbrowser/_bin/unbrowser

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build wheel
          cd python && python -m build --wheel

      - name: Re-tag wheel for ${{ matrix.wheel_platform }}
        # hatchling produces py3-none-any; we re-tag to the correct platform
        # since the wheel bundles a platform-specific binary.
        run: |
          cd python/dist
          python -m wheel tags --remove --platform-tag ${{ matrix.wheel_platform }} pyunbrowser-*-py3-none-any.whl
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unbrowser-${{ matrix.target }}
          path: |
            unbrowser-${{ matrix.target }}.tar.gz
            unbrowser-${{ matrix.target }}.tar.gz.sha256
            python/dist/pyunbrowser-*.whl
          if-no-files-found: error
          retention-days: 7

  build-x86_64-unknown-linux-gnu:
    name: Build x86_64-unknown-linux-gnu
    runs-on: ubuntu-latest
    container: ubuntu:20.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu

      - name: Install build deps
        run: |
          apt-get update
          apt-get install -y ca-certificates cmake curl git build-essential ninja-build pkg-config

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Smoke test (Unix)
        run: |
          echo '{"id":1,"method":"close"}' | ./target/x86_64-unknown-linux-gnu/release/unbrowser > /tmp/out
          cat /tmp/out
          grep -q '"result":"bye"' /tmp/out

      - name: Package archive
        run: |
          cd target/x86_64-unknown-linux-gnu/release
          tar -czf ../../../unbrowser-x86_64-unknown-linux-gnu.tar.gz unbrowser

      - name: Compute checksum
        run: |
          sha256sum unbrowser-x86_64-unknown-linux-gnu.tar.gz > unbrowser-x86_64-unknown-linux-gnu.tar.gz.sha256
          cat unbrowser-x86_64-unknown-linux-gnu.tar.gz.sha256

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bundle binary into Python package
        run: |
          cp target/x86_64-unknown-linux-gnu/release/unbrowser python/unbrowser/_bin/unbrowser
          chmod +x python/unbrowser/_bin/unbrowser

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build wheel
          cd python && python -m build --wheel

      - name: Re-tag wheel for manylinux_2_28_x86_64
        run: |
          cd python/dist
          python -m wheel tags --remove --platform-tag manylinux_2_28_x86_64 pyunbrowser-*-py3-none-any.whl
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unbrowser-x86_64-unknown-linux-gnu
          path: |
            unbrowser-x86_64-unknown-linux-gnu.tar.gz
            unbrowser-x86_64-unknown-linux-gnu.tar.gz.sha256
            python/dist/pyunbrowser-*.whl
          if-no-files-found: error
          retention-days: 7

  # Source distribution. Platform-neutral, no binary inside — lets users
  # on platforms we don't ship a wheel for build from source themselves
  # (and PyPI strongly prefers an sdist alongside any binary wheels).
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          cd python && python -m build --sdist
          ls -la dist/
      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyunbrowser-sdist
          path: python/dist/pyunbrowser-*.tar.gz
          if-no-files-found: error
          retention-days: 7

  # Publish wheels (one per platform from `build`) + sdist to PyPI via
  # OIDC trusted publishing — no PYPI_API_TOKEN secret to manage. Requires
  # the user to configure a Trusted Publisher on PyPI for this repo +
  # workflow + environment ONCE before the first tag push:
  #   PyPI -> Account -> Publishing -> Add a pending publisher
  #   Project name: pyunbrowser  (claims the name on first publish)
  #   Owner: protostatis
  #   Repository: unbrowser
  #   Workflow filename: release.yml
  #   Environment name: pypi   (must match the `environment:` field below)
  publish-pypi:
    name: Publish to PyPI
    needs: [build, build-x86_64-unknown-linux-gnu, build-sdist]
    runs-on: ubuntu-latest
    # Only publish on tag pushes (skip workflow_dispatch test runs).
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write   # required for OIDC trusted publishing
    environment:
      name: pypi
      url: https://pypi.org/p/pyunbrowser
    steps:
      - name: Download all wheel + sdist artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-staging
      - name: Collect distributions into single dist/ dir
        # download-artifact gives one subdir per artifact name; flatten
        # into a single dist/ that gh-action-pypi-publish expects.
        run: |
          mkdir -p dist
          # The PyPI distribution prefix is `pyunbrowser-*` (Python wheels +
          # sdist); the native binary tarballs are `unbrowser-*-{target}.tar.gz`.
          # Different prefixes mean a single find each — no exclusions needed.
          find dist-staging -name 'pyunbrowser-*.whl' -exec cp {} dist/ \;
          find dist-staging -name 'pyunbrowser-*.tar.gz' -exec cp {} dist/ \;
          ls -la dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `password` field — Trusted Publishing uses the OIDC token
        # the GitHub runner already has.

  release:
    name: Create Release
    needs: [build, build-x86_64-unknown-linux-gnu]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so generate_release_notes works

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: unbrowser-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            unbrowser-*.tar.gz
            unbrowser-*.tar.gz.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## Install

            Pick your platform and download:

            | Platform | Asset |
            |---|---|
            | macOS Apple Silicon | `unbrowser-aarch64-apple-darwin.tar.gz` |
            | macOS Intel | `unbrowser-x86_64-apple-darwin.tar.gz` |
            | Linux x86_64 — EC2, Ubuntu 20.04+, AL2023 | `unbrowser-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux arm64 — Graviton2/3/4, Ubuntu 22.04+ | `unbrowser-aarch64-unknown-linux-gnu.tar.gz` |

            ### One-liner (macOS / Linux):

            ```bash
            curl -L https://github.com/protostatis/unbrowser/releases/download/${{ github.ref_name }}/unbrowser-$(uname -m | sed 's/arm64/aarch64/')-$(uname -s | tr A-Z a-z | sed 's/darwin/apple-darwin/;s/linux/unknown-linux-gnu/').tar.gz \
              | tar xz -C /usr/local/bin
            unbrowser --mcp
            ```

            ### Verify checksums:

            ```bash
            shasum -a 256 -c unbrowser-*.tar.gz.sha256
            ```

            ## What's new

            See auto-generated changelog below.
